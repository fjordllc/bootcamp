name: Auto-assign PR author

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo  = context.repo.repo
            const pr    = context.payload.pull_request
            const issue_number = pr.number
            const author = pr.user.login

            if (pr.assignees && pr.assignees.length > 0) {
              console.log("Already has assignees -> skip.")
              return
            }

            const isBot = author.endsWith("[bot]") || pr.user.type === "Bot"
            if (isBot) {
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number,
                assignees: [author],
              })
              console.log(`Assigned bot PR author as assignee: ${author}`)
              return
            }

            try {
              const permRes = await github.rest.repos.getCollaboratorPermissionLevel({
                owner,
                repo,
                username: author,
              })

              const perm = permRes.data.permission
              console.log(`PR author: ${author}, permission: ${perm}`)

              const canCommit = ["admin", "maintain", "write"].includes(perm)
              if (!canCommit) {
                console.log("No write+ permission -> skip assigning.")
                return
              }

              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number,
                assignees: [author],
              })

              console.log("Assigned PR author as assignee.")
            } catch (error) {
              console.log("Permission check failed (likely external contributor). Skip.")
            }
