name: Review App Cleanup

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/335091307227/locations/global/workloadIdentityPools/github-actions/providers/github-actions-provider
          service_account: actions-cloud-run-deploy@bootcamp-224405.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Cleanup Review App via Cloud Build
        run: |
          gcloud builds submit \
            --config=.cloudbuild/cloudbuild-review-cleanup.yaml \
            --substitutions="\
              _PR_NUMBER=${PR_NUMBER},\
              _CLOUD_SQL_HOST=bootcamp-224405:asia-northeast1:bootcamp,\
              _DB_USER=review,\
              _DB_PASS=${{ secrets.REVIEW_DB_PASS }}" \
            --project=bootcamp-224405 \
            --region=asia-northeast1 \
            --no-source \
            --quiet
