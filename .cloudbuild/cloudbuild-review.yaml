---
steps:
- id: Fetch
  name: gcr.io/cloud-builders/docker
  entrypoint: bash
  args:
  - "-c"
  - docker pull asia.gcr.io/bootcamp-224405/bootcamp:latest || exit 0
- id: Build
  name: gcr.io/cloud-builders/docker
  args:
  - build
  - "-t"
  - asia.gcr.io/bootcamp-224405/bootcamp:pr-${_PR_NUMBER}
  - "."
  - "-f"
  - Dockerfile
- id: Push
  name: gcr.io/cloud-builders/docker
  args:
  - push
  - asia.gcr.io/bootcamp-224405/bootcamp:pr-${_PR_NUMBER}
  waitFor:
  - Build
- id: WriteSubstitutionEnv
  name: gcr.io/google.com/cloudsdktool/cloud-sdk
  entrypoint: python3
  args:
  - ".cloudbuild/cloud-build-env"
  - write
  - ".cloudbuild/substitutions.env"
  - --build
  - "$PROJECT_ID"
  - "$BUILD_ID"
  - asia-northeast1
  waitFor:
  - Push
- id: SqlProxy
  name: gcr.io/cloudsql-docker/gce-proxy:1.16
  args:
  - "/cloud_sql_proxy"
  - "-dir=/cloudsql"
  - "-instances=$_CLOUD_SQL_HOST"
  waitFor:
  - Push
  volumes:
  - name: db
    path: "/cloudsql"
- id: WaitForProxy
  name: postgres:16-alpine
  entrypoint: sh
  args:
  - "-c"
  - |
    set -eu
    echo "Waiting for Cloud SQL Proxy to be ready..."
    TIMEOUT=300
    ELAPSED=0
    while [ $$ELAPSED -lt $$TIMEOUT ]; do
      if PGPASSWORD="$_DB_PASS" PGCONNECT_TIMEOUT=2 psql -h "/cloudsql/$_CLOUD_SQL_HOST" -U "$_DB_USER" -d postgres -c "SELECT 1"; then
        echo "Cloud SQL Proxy is ready."
        exit 0
      fi
      echo "Database not ready yet, waiting..."
      sleep 2
      ELAPSED=$$(($$ELAPSED + 2))
    done
    echo "ERROR: Timeout waiting for Cloud SQL Proxy"
    exit 1
  waitFor:
  - Push
  volumes:
  - name: db
    path: "/cloudsql"
- id: CreateDB
  name: postgres:16-alpine
  entrypoint: sh
  args:
  - "-c"
  - |
    set -eu
    case "$_DB_NAME" in
      (*[!a-zA-Z0-9_]*|'')
        echo "Invalid DB name: $_DB_NAME" >&2
        exit 1
        ;;
    esac
    echo "Creating database $_DB_NAME (drop if exists)..."
    PGPASSWORD="$_DB_PASS" psql -h "/cloudsql/$_CLOUD_SQL_HOST" -U "$_DB_USER" -d postgres -c \
      "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = '$_DB_NAME' AND pid <> pg_backend_pid();"
    PGPASSWORD="$_DB_PASS" psql -h "/cloudsql/$_CLOUD_SQL_HOST" -U "$_DB_USER" -d postgres -c \
      "DROP DATABASE IF EXISTS $_DB_NAME;"
    PGPASSWORD="$_DB_PASS" psql -h "/cloudsql/$_CLOUD_SQL_HOST" -U "$_DB_USER" -d postgres -c \
      "CREATE DATABASE $_DB_NAME;"
    echo "Database $_DB_NAME created successfully"
  waitFor:
  - WaitForProxy
  volumes:
  - name: db
    path: "/cloudsql"
- id: EnablePgvector
  name: postgres:16-alpine
  entrypoint: sh
  args:
  - "-c"
  - |
    set -eu
    echo "Enabling pgvector extension..."
    PGPASSWORD="$_DB_PASS" psql -h "/cloudsql/$_CLOUD_SQL_HOST" -U "$_DB_USER" -d "$_DB_NAME" -c \
      "CREATE EXTENSION IF NOT EXISTS vector;"
    echo "pgvector extension enabled"
  waitFor:
  - CreateDB
  volumes:
  - name: db
    path: "/cloudsql"
- id: DBMigrate
  name: asia.gcr.io/bootcamp-224405/bootcamp:pr-${_PR_NUMBER}
  automapSubstitutions: true
  args:
  - bash
  - "-c"
  - |-
    source .cloudbuild/substitutions.env
    eval "$(.cloudbuild/cloud-build-env exports)"
    bin/rails db:migrate db:seed
  waitFor:
  - EnablePgvector
  - WriteSubstitutionEnv
  volumes:
  - name: db
    path: "/cloudsql"
- id: Kill_SqlProxy
  name: gcr.io/cloud-builders/docker
  entrypoint: sh
  args:
  - "-c"
  - CONTAINER=$$(docker ps -q --filter "volume=db"); [ -n "$$CONTAINER" ] && docker kill -s TERM $$CONTAINER || echo "No proxy container found"
  waitFor:
  - DBMigrate
- id: Deploy
  name: gcr.io/google.com/cloudsdktool/cloud-sdk
  automapSubstitutions: true
  entrypoint: bash
  args:
  - ".cloudbuild/deploy-cloud-run"
  - review
  waitFor:
  - Kill_SqlProxy
options:
  substitutionOption: ALLOW_LOOSE
  automapSubstitutions: true
timeout: 7200s
images:
- asia.gcr.io/bootcamp-224405/bootcamp:pr-${_PR_NUMBER}
substitutions:
  _PR_NUMBER: '0'
  _MEMORY: 2G
  _ANTHROPIC_API_KEY: ''
  _APP_HOST_NAME: ''
  _BASIC_AUTH_PASSWORD: ''
  _BASIC_AUTH_USER: ''
  _CLOUD_RUN_HOST_NAME: ''
  _CLOUD_SQL_HOST: ''
  _DB_NAME: ''
  _DB_PASS: ''
  _DB_USER: ''
  _GCS_BUCKET: ''
  _GITHUB_KEY: ''
  _GITHUB_SECRET: ''
  _GOOGLE_CREDENTIALS: ''
  _MISSION_CONTROL_PASSWORD: ''
  _MISSION_CONTROL_USERNAME: ''
  _OPEN_AI_ACCESS_TOKEN: ''
  _POSTMARK_API_TOKEN: ''
  _RAILS_MASTER_KEY: ''
  _RECAPTCHA_SECRET_KEY: ''
  _RECAPTCHA_SITE_KEY: ''
  _SERVICE_NAME: ''
  _STRIPE_PUBLIC_KEY: ''
  _STRIPE_SECRET_KEY: ''
  _TOKEN: ''
