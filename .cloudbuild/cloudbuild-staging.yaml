steps:
  - id: Fetch
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - '-c'
      - 'docker pull asia.gcr.io/$PROJECT_ID/$REPO_NAME:latest || exit 0'
  - id: Build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-t'
      - 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
      - '-t'
      - 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:latest'
      - .
      - '-f'
      - Dockerfile
  - id: Push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
    waitFor:
      - Build
  # Cloud Runサービスを削除してDB接続を切断し、Deployで再作成される
  - id: StopCloudRun
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        echo "Deleting Cloud Run service to disconnect database connections..."

        # サービスが存在するか確認して削除
        if gcloud run services describe $_SERVICE_NAME --region=asia-northeast1 --quiet 2>/dev/null; then
          gcloud run services delete $_SERVICE_NAME \
            --region=asia-northeast1 \
            --quiet

          echo "Cloud Run service deleted. Waiting 60 seconds for connections to close..."
          sleep 60
        else
          echo "Cloud Run service does not exist yet. Skipping delete."
        fi
    waitFor:
      - Push
  - id: SqlProxy
    name: 'gcr.io/cloudsql-docker/gce-proxy:1.16'
    args:
      - /cloud_sql_proxy
      - '-dir=/cloudsql'
      - '-instances=$_CLOUD_SQL_HOST'
    waitFor:
      - StopCloudRun
    volumes:
      - name: db
        path: /cloudsql
  # Cloud SQL Proxyの起動を待つ
  - id: WaitForProxy
    name: 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
    args:
      - bash
      - '-c'
      - |
        set -euo pipefail

        echo "Waiting for Cloud SQL Proxy to be ready..."
        TIMEOUT=60
        ELAPSED=0

        while [ $$ELAPSED -lt $$TIMEOUT ]; do
          echo "Attempting database connection... ($$ELAPSED/$$TIMEOUT seconds)"
          OUTPUT=$$(cat <<'TESTEOF' | bin/rails runner - 2>&1
        begin
          ActiveRecord::Base.connection.execute("SELECT 1")
          puts "Database connection successful"
          exit 0
        rescue => e
          puts "Connection failed: #{e.message}"
          exit 1
        end
        TESTEOF
          )
          EXITCODE=$$?
          if [ $$EXITCODE -eq 0 ]; then
            echo "$$OUTPUT"
            echo "Cloud SQL Proxy is ready."
            exit 0
          else
            echo "Rails runner output: $$OUTPUT"
            echo "Database not ready yet, waiting..."
          fi
          sleep 2
          ELAPSED=$$(($$ELAPSED + 2))
        done

        echo "ERROR: Timeout waiting for Cloud SQL Proxy after $$TIMEOUT seconds"
        exit 1
    waitFor:
      - StopCloudRun
    volumes:
      - name: db
        path: /cloudsql
    env:
      - RAILS_ENV=production
      - DISABLE_DATABASE_ENVIRONMENT_CHECK=1
      - DB_HOST=/cloudsql/$_CLOUD_SQL_HOST
      - DB_NAME=postgres
      - DB_PASS=$_DB_PASS
      - DB_USER=$_DB_USER
      - RAILS_MASTER_KEY=$_RAILS_MASTER_KEY
      - APP_HOST_NAME=$_APP_HOST_NAME
  # bootcamp_stagingへの接続を強制切断してからデータベースを削除
  - id: DeleteDB
    name: 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail

        echo "Terminating all connections to bootcamp_staging..."
        cat <<'SQLEOF' | bin/rails runner - 2>&1
        result = ActiveRecord::Base.connection.execute(<<~SQL)
          SELECT pg_terminate_backend(pid)
          FROM pg_stat_activity
          WHERE datname = 'bootcamp_staging'
            AND pid <> pg_backend_pid()
        SQL
        puts "Terminated #{result.count} connection(s)"
        SQLEOF

        echo "Dropping database bootcamp_staging..."
        cat <<'SQLEOF' | bin/rails runner - 2>&1
        ActiveRecord::Base.connection.execute("DROP DATABASE IF EXISTS bootcamp_staging")
        puts "Database dropped successfully"
        SQLEOF
    waitFor:
      - WaitForProxy
    volumes:
      - name: db
        path: /cloudsql
    env:
      - RAILS_ENV=production
      - DISABLE_DATABASE_ENVIRONMENT_CHECK=1
      - DB_HOST=/cloudsql/$_CLOUD_SQL_HOST
      - DB_NAME=postgres
      - DB_PASS=$_DB_PASS
      - DB_USER=$_DB_USER
      - RAILS_MASTER_KEY=$_RAILS_MASTER_KEY
      - APP_HOST_NAME=$_APP_HOST_NAME
  - id: CreateDB
    name: 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail

        echo "Creating database bootcamp_staging..."
        cat <<'SQLEOF' | bin/rails runner - 2>&1
        ActiveRecord::Base.connection.execute("CREATE DATABASE bootcamp_staging")
        puts "Database created successfully"
        SQLEOF
    waitFor:
      - DeleteDB
    volumes:
      - name: db
        path: /cloudsql
    env:
      - RAILS_ENV=production
      - DISABLE_DATABASE_ENVIRONMENT_CHECK=1
      - DB_HOST=/cloudsql/$_CLOUD_SQL_HOST
      - DB_NAME=postgres
      - DB_PASS=$_DB_PASS
      - DB_USER=$_DB_USER
      - RAILS_MASTER_KEY=$_RAILS_MASTER_KEY
      - APP_HOST_NAME=$_APP_HOST_NAME
  - id: EnablePgvector
    name: 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail

        echo "Enabling pgvector extension on bootcamp_staging..."
        cat <<'SQLEOF' | bin/rails runner - 2>&1
        ActiveRecord::Base.connection.execute("CREATE EXTENSION IF NOT EXISTS vector")
        puts "pgvector extension enabled"
        SQLEOF
    waitFor:
      - CreateDB
    volumes:
      - name: db
        path: /cloudsql
    env:
      - RAILS_ENV=production
      - DISABLE_DATABASE_ENVIRONMENT_CHECK=1
      - DB_HOST=/cloudsql/$_CLOUD_SQL_HOST
      - DB_NAME=$_DB_NAME
      - DB_PASS=$_DB_PASS
      - DB_USER=$_DB_USER
      - RAILS_MASTER_KEY=$_RAILS_MASTER_KEY
      - APP_HOST_NAME=$_APP_HOST_NAME
  - id: DBMigrate
    name: 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
    args:
      - bin/rails
      - db:migrate
      - db:seed
    waitFor:
      - EnablePgvector
    volumes:
      - name: db
        path: /cloudsql
    env:
      - RAILS_ENV=production
      - DISABLE_DATABASE_ENVIRONMENT_CHECK=1
      - DB_HOST=/cloudsql/$_CLOUD_SQL_HOST
      - DB_NAME=$_DB_NAME
      - DB_PASS=$_DB_PASS
      - DB_USER=$_DB_USER
      - RAILS_MASTER_KEY=$_RAILS_MASTER_KEY
      - APP_HOST_NAME=$_APP_HOST_NAME
  - id: Kill_SqlProxy
    name: gcr.io/cloud-builders/docker
    entrypoint: sh
    args:
      - '-c'
      - docker kill -s TERM $(docker ps -q --filter "volume=db")
    waitFor:
      - DBMigrate
  - id: Deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - '--platform=managed'
      - '--region=asia-northeast1'
      - '--quiet'
      - '--image=asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
      - '--allow-unauthenticated'
      - '--clear-vpc-connector'
      - '--add-cloudsql-instances'
      - $_CLOUD_SQL_HOST
      - '--memory'
      - $_MEMORY
      - '--timeout'
      - '10m'
      - >-
        --set-env-vars=LANG=ja_JP.UTF-8,TZ=Asia/Tokyo,RAILS_SERVE_STATIC_FILES=true,RAILS_LOG_TO_STDOUT=true,RAILS_ENV=production,RACK_ENV=production,APP_HOST_NAME=$_APP_HOST_NAME,CLOUD_RUN_HOST_NAME=$_CLOUD_RUN_HOST_NAME,DB_NAME=$_DB_NAME,DB_USER=$_DB_USER,DB_HOST=/cloudsql/$_CLOUD_SQL_HOST,GCS_BUCKET=$_GCS_BUCKET,BASIC_AUTH_USER=$_BASIC_AUTH_USER
      - >-
        --set-secrets=RAILS_MASTER_KEY=bootcamp-staging-rails-master-key:latest,DB_PASS=bootcamp-staging-db-pass:latest,GOOGLE_CREDENTIALS=bootcamp-staging-google-credentials:latest,TOKEN=bootcamp-staging-token:latest,DISCORD_NOTICE_WEBHOOK_URL=bootcamp-staging-discord-notice-webhook-url:latest,DISCORD_INTRODUCTION_WEBHOOK_URL=bootcamp-staging-discord-introduction-webhook-url:latest,DISCORD_ALL_WEBHOOK_URL=bootcamp-staging-discord-all-webhook-url:latest,DISCORD_ADMIN_WEBHOOK_URL=bootcamp-staging-discord-admin-webhook-url:latest,DISCORD_MENTOR_WEBHOOK_URL=bootcamp-staging-discord-mentor-webhook-url:latest,DISCORD_BUG_WEBHOOK_URL=bootcamp-staging-discord-bug-webhook-url:latest,DISCORD_REPORT_WEBHOOK_URL=bootcamp-staging-discord-report-webhook-url:latest,DISCORD_GUILD_ID=bootcamp-staging-discord-guild-id:latest,DISCORD_TIMES_CHANNEL_CATEGORY_ID=bootcamp-staging-discord-times-channel-category-id:latest,DISCORD_BOT_TOKEN=bootcamp-staging-discord-bot-token:latest,MISSION_CONTROL_USERNAME=bootcamp-staging-mission-control-username:latest,MISSION_CONTROL_PASSWORD=bootcamp-staging-mission-control-password:latest,STRIPE_ENDPOINT_SECRET=bootcamp-staging-stripe-endpoint-secret:latest,BASIC_AUTH_PASSWORD=bootcamp-staging-basic-auth-password:latest,RECAPTCHA_SITE_KEY=bootcamp-staging-recaptcha-site-key:latest,RECAPTCHA_SECRET_KEY=bootcamp-staging-recaptcha-secret-key:latest,ROLLBAR_CLIENT_TOKEN=bootcamp-staging-rollbar-client-token:latest,OPEN_AI_ACCESS_TOKEN=bootcamp-staging-open-ai-access-token:latest,ANTHROPIC_API_KEY=bootcamp-staging-anthropic-api-key:latest,PJORD_GITHUB_TOKEN=bootcamp-staging-pjord-github-token:latest,STRIPE_TAX_RATE_ID=bootcamp-staging-stripe-tax-rate-id:latest,DISCORD_CLIENT_ID=bootcamp-staging-discord-client-id:latest,DISCORD_CLIENT_SECRET=bootcamp-staging-discord-client-secret:latest,DISCORD_AUTHENTICATION_URL=bootcamp-staging-discord-authentication-url:latest,PUBSUB_AUDIENCE=bootcamp-staging-pubsub-audience:latest,PUBSUB_SERVICE_ACCOUNT_EMAIL=bootcamp-staging-pubsub-service-account-email:latest,PUBSUB_TOPIC=bootcamp-staging-pubsub-topic:latest,GITHUB_KEY=bootcamp-staging-github-key:latest,GITHUB_SECRET=bootcamp-staging-github-secret:latest,ROLLBAR_ACCESS_TOKEN=bootcamp-staging-rollbar-access-token:latest,SLACK_WEBHOOK_URL=bootcamp-staging-slack-webhook-url:latest,STRIPE_PUBLIC_KEY=bootcamp-staging-stripe-public-key:latest,STRIPE_SECRET_KEY=bootcamp-staging-stripe-secret-key:latest,POSTMARK_API_TOKEN=bootcamp-staging-postmark-api-token:latest
      - >-
        --labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID,$_LABELS
  - id: Notify
    name: 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:latest'
    args:
      - bin/notify
    waitFor:
      - Deploy
    env:
      - DB_NAME=$_DB_NAME
      - DEPLOY_NOTIFY_WEBHOOK_URL=$_DEPLOY_NOTIFY_WEBHOOK_URL
timeout: 7200s
images:
  - 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:latest'
substitutions:
  _APP_HOST_NAME: bootcamp-staging.fjord.jp
