steps:
  - id: Fetch
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - '-c'
      - 'docker pull asia.gcr.io/$PROJECT_ID/$REPO_NAME:latest || exit 0'
  - id: Build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-t'
      - 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
      - '-t'
      - 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:latest'
      - .
      - '-f'
      - Dockerfile
  - id: Push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
    waitFor:
      - Build
  # Cloud Runサービスを削除してDB接続を切断し、Deployで再作成される
  - id: StopCloudRun
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        echo "Deleting Cloud Run service to disconnect database connections..."

        # サービスが存在するか確認して削除
        if gcloud run services describe $_SERVICE_NAME --region=asia-northeast1 --quiet 2>/dev/null; then
          gcloud run services delete $_SERVICE_NAME \
            --region=asia-northeast1 \
            --quiet

          echo "Cloud Run service deleted. Waiting 60 seconds for connections to close..."
          sleep 60
        else
          echo "Cloud Run service does not exist yet. Skipping delete."
        fi
    waitFor:
      - Push
  - id: SqlProxy
    name: 'gcr.io/cloudsql-docker/gce-proxy:1.16'
    args:
      - /cloud_sql_proxy
      - '-dir=/cloudsql'
      - '-instances=$_CLOUD_SQL_HOST'
    waitFor:
      - StopCloudRun
    volumes:
      - name: db
        path: /cloudsql
  # Cloud SQL Proxyの起動を待つ
  - id: WaitForProxy
    name: 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
    args:
      - bash
      - '-c'
      - |
        set -euo pipefail

        echo "Waiting for Cloud SQL Proxy to be ready..."
        TIMEOUT=60
        ELAPSED=0

        while [ $$ELAPSED -lt $$TIMEOUT ]; do
          echo "Attempting database connection... ($$ELAPSED/$$TIMEOUT seconds)"
          OUTPUT=$$(cat <<'TESTEOF' | bin/rails runner - 2>&1
        begin
          ActiveRecord::Base.connection.execute("SELECT 1")
          puts "Database connection successful"
          exit 0
        rescue => e
          puts "Connection failed: #{e.message}"
          exit 1
        end
        TESTEOF
          )
          EXITCODE=$$?
          if [ $$EXITCODE -eq 0 ]; then
            echo "$$OUTPUT"
            echo "Cloud SQL Proxy is ready."
            exit 0
          else
            echo "Rails runner output: $$OUTPUT"
            echo "Database not ready yet, waiting..."
          fi
          sleep 2
          ELAPSED=$$(($$ELAPSED + 2))
        done

        echo "ERROR: Timeout waiting for Cloud SQL Proxy after $$TIMEOUT seconds"
        exit 1
    waitFor:
      - StopCloudRun
    volumes:
      - name: db
        path: /cloudsql
    env:
      - RAILS_ENV=production
      - DISABLE_DATABASE_ENVIRONMENT_CHECK=1
      - DB_HOST=/cloudsql/$_CLOUD_SQL_HOST
      - DB_NAME=postgres
      - DB_USER=$_DB_USER
      - APP_HOST_NAME=$_APP_HOST_NAME
    secretEnv:
      - DB_PASS
      - RAILS_MASTER_KEY
  # bootcamp_stagingへの接続を強制切断してからデータベースを削除
  - id: DeleteDB
    name: 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail

        echo "Terminating all connections to bootcamp_staging..."
        cat <<'SQLEOF' | bin/rails runner - 2>&1
        result = ActiveRecord::Base.connection.execute(<<~SQL)
          SELECT pg_terminate_backend(pid)
          FROM pg_stat_activity
          WHERE datname = 'bootcamp_staging'
            AND pid <> pg_backend_pid()
        SQL
        puts "Terminated #{result.count} connection(s)"
        SQLEOF

        echo "Dropping database bootcamp_staging..."
        cat <<'SQLEOF' | bin/rails runner - 2>&1
        ActiveRecord::Base.connection.execute("DROP DATABASE IF EXISTS bootcamp_staging")
        puts "Database dropped successfully"
        SQLEOF
    waitFor:
      - WaitForProxy
    volumes:
      - name: db
        path: /cloudsql
    env:
      - RAILS_ENV=production
      - DISABLE_DATABASE_ENVIRONMENT_CHECK=1
      - DB_HOST=/cloudsql/$_CLOUD_SQL_HOST
      - DB_NAME=postgres
      - DB_USER=$_DB_USER
      - APP_HOST_NAME=$_APP_HOST_NAME
    secretEnv:
      - DB_PASS
      - RAILS_MASTER_KEY
  - id: CreateDB
    name: 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail

        echo "Creating database bootcamp_staging..."
        cat <<'SQLEOF' | bin/rails runner - 2>&1
        ActiveRecord::Base.connection.execute("CREATE DATABASE bootcamp_staging")
        puts "Database created successfully"
        SQLEOF
    waitFor:
      - DeleteDB
    volumes:
      - name: db
        path: /cloudsql
    env:
      - RAILS_ENV=production
      - DISABLE_DATABASE_ENVIRONMENT_CHECK=1
      - DB_HOST=/cloudsql/$_CLOUD_SQL_HOST
      - DB_NAME=postgres
      - DB_USER=$_DB_USER
      - APP_HOST_NAME=$_APP_HOST_NAME
    secretEnv:
      - DB_PASS
      - RAILS_MASTER_KEY
  - id: EnablePgvector
    name: 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail

        echo "Enabling pgvector extension on bootcamp_staging..."
        cat <<'SQLEOF' | bin/rails runner - 2>&1
        ActiveRecord::Base.connection.execute("CREATE EXTENSION IF NOT EXISTS vector")
        puts "pgvector extension enabled"
        SQLEOF
    waitFor:
      - CreateDB
    volumes:
      - name: db
        path: /cloudsql
    env:
      - RAILS_ENV=production
      - DISABLE_DATABASE_ENVIRONMENT_CHECK=1
      - DB_HOST=/cloudsql/$_CLOUD_SQL_HOST
      - DB_NAME=$_DB_NAME
      - DB_USER=$_DB_USER
      - APP_HOST_NAME=$_APP_HOST_NAME
    secretEnv:
      - DB_PASS
      - RAILS_MASTER_KEY
  - id: DBMigrate
    name: 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
    args:
      - bin/rails
      - db:migrate
      - db:seed
    waitFor:
      - EnablePgvector
    volumes:
      - name: db
        path: /cloudsql
    env:
      - RAILS_ENV=production
      - DISABLE_DATABASE_ENVIRONMENT_CHECK=1
      - DB_HOST=/cloudsql/$_CLOUD_SQL_HOST
      - DB_NAME=$_DB_NAME
      - DB_USER=$_DB_USER
      - APP_HOST_NAME=$_APP_HOST_NAME
    secretEnv:
      - DB_PASS
      - RAILS_MASTER_KEY
  - id: Kill_SqlProxy
    name: gcr.io/cloud-builders/docker
    entrypoint: sh
    args:
      - '-c'
      - docker kill -s TERM $(docker ps -q --filter "volume=db")
    waitFor:
      - DBMigrate
  - id: Deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail

        SERVICE_YAML=/workspace/tmp/cloud-run-staging.yaml
        mkdir -p /workspace/tmp
        sed \
          -e "s|__IMAGE__|asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA|g" \
          -e "s|__SERVICE_NAME__|$_SERVICE_NAME|g" \
          -e "s|__CLOUD_SQL_HOST__|$_CLOUD_SQL_HOST|g" \
          -e "s|__APP_HOST_NAME__|$_APP_HOST_NAME|g" \
          -e "s|__CLOUD_RUN_HOST_NAME__|$_CLOUD_RUN_HOST_NAME|g" \
          -e "s|__DB_NAME__|$_DB_NAME|g" \
          -e "s|__DB_USER__|$_DB_USER|g" \
          -e "s|__GCS_BUCKET__|$_GCS_BUCKET|g" \
          -e "s|__BASIC_AUTH_USER__|$_BASIC_AUTH_USER|g" \
          -e "s|__COMMIT_SHA__|$COMMIT_SHA|g" \
          -e "s|__BUILD_ID__|$BUILD_ID|g" \
          -e "s|__TRIGGER_ID__|$_TRIGGER_ID|g" \
          config/cloud_run/staging.yaml > "$$SERVICE_YAML"

        gcloud run services replace "$$SERVICE_YAML" \
          --region=asia-northeast1 \
          --quiet

        gcloud run services update $_SERVICE_NAME \
          --region=asia-northeast1 \
          --labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID,$_LABELS \
          --quiet

        gcloud run services add-iam-policy-binding $_SERVICE_NAME \
          --region=asia-northeast1 \
          --member=allUsers \
          --role=roles/run.invoker \
          --quiet
  - id: Notify
    name: 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:latest'
    args:
      - bin/notify
    waitFor:
      - Deploy
    env:
      - DB_NAME=$_DB_NAME
    secretEnv:
      - DEPLOY_NOTIFY_WEBHOOK_URL
timeout: 7200s
images:
  - 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:latest'
substitutions:
  _APP_HOST_NAME: bootcamp-staging.fjord.jp
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/bootcamp-staging-db-pass/versions/latest
      env: DB_PASS
    - versionName: projects/$PROJECT_ID/secrets/bootcamp-staging-rails-master-key/versions/latest
      env: RAILS_MASTER_KEY
    - versionName: projects/$PROJECT_ID/secrets/bootcamp-staging-deploy-notify-webhook-url/versions/latest
      env: DEPLOY_NOTIFY_WEBHOOK_URL
