steps:
  - id: Fetch
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - '-c'
      - 'docker pull asia.gcr.io/$PROJECT_ID/$REPO_NAME:latest || exit 0'
  - id: Build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-t'
      - 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
      - '-t'
      - 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:latest'
      - '--cache-from'
      - 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:latest'
      - .
      - '-f'
      - Dockerfile
  - id: Push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
  - id: SqlProxy
    name: 'gcr.io/cloudsql-docker/gce-proxy:1.16'
    args:
      - /cloud_sql_proxy
      - '-dir=/cloudsql'
      - '-instances=$_CLOUD_SQL_HOST'
    waitFor:
      - '-'
    volumes:
      - name: db
        path: /cloudsql
  - id: DB_Migrate
    name: 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
    args:
      - bin/rails
      - db:migrate:with_data
    waitFor:
      - Push
    volumes:
      - name: db
        path: /cloudsql
    env:
      - RAILS_ENV=production
      - DISABLE_DATABASE_ENVIRONMENT_CHECK=1
      - DB_HOST=/cloudsql/$_CLOUD_SQL_HOST
      - DB_NAME=$_DB_NAME
      - DB_USER=$_DB_USER
      - APP_HOST_NAME=$_APP_HOST_NAME
    secretEnv:
      - DB_PASS
      - RAILS_MASTER_KEY
  - id: Kill_SqlProxy
    name: gcr.io/cloud-builders/docker
    entrypoint: sh
    args:
      - '-c'
      - docker kill -s TERM $(docker ps -q --filter "volume=db")
    waitFor:
      - DB_Migrate
  - id: Deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail

        SERVICE_YAML=/workspace/tmp/cloud-run-production.yaml
        mkdir -p /workspace/tmp
        bin/render-cloud-run-service config/cloud_run/production.yaml "$$SERVICE_YAML"

        gcloud run services replace "$$SERVICE_YAML" \
          --region=asia-northeast1 \
          --quiet

        gcloud run services update $_SERVICE_NAME \
          --region=asia-northeast1 \
          --labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID,$_LABELS \
          --quiet

        gcloud run services add-iam-policy-binding $_SERVICE_NAME \
          --region=asia-northeast1 \
          --member=allUsers \
          --role=roles/run.invoker \
          --quiet
  - id: UpdateLinkCheckerJob
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    waitFor:
      - Deploy
    args:
      - '-c'
      - |
        if gcloud run jobs describe link-checker --region=asia-northeast1 --quiet 2>/dev/null; then
          gcloud run jobs update link-checker \
            --region=asia-northeast1 \
            --image=asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA \
            --args="bin/rails,link_checker:run" \
            --set-cloudsql-instances=$_CLOUD_SQL_HOST \
            --memory=2G \
            --cpu=1 \
            --task-timeout=30m \
            --max-retries=1 \
            --set-env-vars="RAILS_ENV=production,APP_HOST_NAME=$_APP_HOST_NAME,DB_HOST=/cloudsql/$_CLOUD_SQL_HOST,DB_NAME=$_DB_NAME,DB_USER=$_DB_USER,RAILS_LOG_TO_STDOUT=true" \
            --set-secrets="RAILS_MASTER_KEY=bootcamp-production-rails-master-key:latest,DB_PASS=bootcamp-production-db-pass:latest,DISCORD_BUG_WEBHOOK_URL=bootcamp-production-discord-bug-webhook-url:latest"
        else
          gcloud run jobs create link-checker \
            --region=asia-northeast1 \
            --image=asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA \
            --args="bin/rails,link_checker:run" \
            --set-cloudsql-instances=$_CLOUD_SQL_HOST \
            --memory=2G \
            --cpu=1 \
            --task-timeout=30m \
            --max-retries=1 \
            --set-env-vars="RAILS_ENV=production,APP_HOST_NAME=$_APP_HOST_NAME,DB_HOST=/cloudsql/$_CLOUD_SQL_HOST,DB_NAME=$_DB_NAME,DB_USER=$_DB_USER,RAILS_LOG_TO_STDOUT=true" \
            --set-secrets="RAILS_MASTER_KEY=bootcamp-production-rails-master-key:latest,DB_PASS=bootcamp-production-db-pass:latest,DISCORD_BUG_WEBHOOK_URL=bootcamp-production-discord-bug-webhook-url:latest"
        fi
  - id: Notify
    name: 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:latest'
    args:
      - bin/notify
    waitFor:
      - Deploy
    env:
      - DB_NAME=$_DB_NAME
    secretEnv:
      - DEPLOY_NOTIFY_WEBHOOK_URL
timeout: 7200s
images:
  - 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:latest'
substitutions:
  _APP_HOST_NAME: bootcamp.fjord.jp
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/bootcamp-production-db-pass/versions/latest
      env: DB_PASS
    - versionName: projects/$PROJECT_ID/secrets/bootcamp-production-rails-master-key/versions/latest
      env: RAILS_MASTER_KEY
    - versionName: projects/$PROJECT_ID/secrets/bootcamp-production-deploy-notify-webhook-url/versions/latest
      env: DEPLOY_NOTIFY_WEBHOOK_URL
