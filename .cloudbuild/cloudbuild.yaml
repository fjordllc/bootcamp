steps:
  - id: Fetch
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - '-c'
      - 'docker pull asia.gcr.io/$PROJECT_ID/$REPO_NAME:latest || exit 0'
  - id: Build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-t'
      - 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
      - '-t'
      - 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:latest'
      - '--cache-from'
      - 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:latest'
      - .
      - '-f'
      - Dockerfile
  - id: Push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
  - id: SqlProxy
    name: 'gcr.io/cloudsql-docker/gce-proxy:1.16'
    args:
      - /cloud_sql_proxy
      - '-dir=/cloudsql'
      - '-instances=$_CLOUD_SQL_HOST'
    waitFor:
      - '-'
    volumes:
      - name: db
        path: /cloudsql
  - id: DB_Migrate
    name: 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
    args:
      - bin/rails
      - db:migrate:with_data
    waitFor:
      - Push
    volumes:
      - name: db
        path: /cloudsql
    env:
      - RAILS_ENV=production
      - DISABLE_DATABASE_ENVIRONMENT_CHECK=1
      - DB_HOST=/cloudsql/$_CLOUD_SQL_HOST
      - DB_NAME=$_DB_NAME
      - DB_PASS=$_DB_PASS
      - DB_USER=$_DB_USER
      - RAILS_MASTER_KEY=$_RAILS_MASTER_KEY
      - APP_HOST_NAME=$_APP_HOST_NAME
  - id: Kill_SqlProxy
    name: gcr.io/cloud-builders/docker
    entrypoint: sh
    args:
      - '-c'
      - docker kill -s TERM $(docker ps -q --filter "volume=db")
    waitFor:
      - DB_Migrate
  - id: Deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - '--platform=managed'
      - '--region=asia-northeast1'
      - '--quiet'
      - '--image=asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
      - '--allow-unauthenticated'
      - '--clear-vpc-connector'
      - '--add-cloudsql-instances'
      - $_CLOUD_SQL_HOST
      - '--memory'
      - $_MEMORY
      - '--concurrency'
      - '5'
      - '--timeout'
      - '10m'
      - >-
        --set-env-vars=LANG=ja_JP.UTF-8,RAILS_MAX_THREADS=5,TZ=Asia/Tokyo,RAILS_SERVE_STATIC_FILES=true,RAILS_LOG_TO_STDOUT=true,RAILS_ENV=production,RACK_ENV=production,APP_HOST_NAME=$_APP_HOST_NAME,CLOUD_RUN_HOST_NAME=$_CLOUD_RUN_HOST_NAME,DB_NAME=$_DB_NAME,DB_USER=$_DB_USER,DB_HOST=/cloudsql/$_CLOUD_SQL_HOST,GCS_BUCKET=$_GCS_BUCKET,BASIC_AUTH_USER=$_BASIC_AUTH_USER,PJORD_LLM_MODEL=claude-sonnet-4-6
      - >-
        --set-secrets=RAILS_MASTER_KEY=bootcamp-production-rails-master-key:latest,DB_PASS=bootcamp-production-db-pass:latest,GOOGLE_CREDENTIALS=bootcamp-production-google-credentials:latest,TOKEN=bootcamp-production-token:latest,DISCORD_NOTICE_WEBHOOK_URL=bootcamp-production-discord-notice-webhook-url:latest,DISCORD_INTRODUCTION_WEBHOOK_URL=bootcamp-production-discord-introduction-webhook-url:latest,DISCORD_ALL_WEBHOOK_URL=bootcamp-production-discord-all-webhook-url:latest,DISCORD_ADMIN_WEBHOOK_URL=bootcamp-production-discord-admin-webhook-url:latest,DISCORD_MENTOR_WEBHOOK_URL=bootcamp-production-discord-mentor-webhook-url:latest,DISCORD_BUG_WEBHOOK_URL=bootcamp-production-discord-bug-webhook-url:latest,DISCORD_REPORT_WEBHOOK_URL=bootcamp-production-discord-report-webhook-url:latest,DISCORD_GUILD_ID=bootcamp-production-discord-guild-id:latest,DISCORD_TIMES_CHANNEL_CATEGORY_ID=bootcamp-production-discord-times-channel-category-id:latest,DISCORD_BOT_TOKEN=bootcamp-production-discord-bot-token:latest,MISSION_CONTROL_USERNAME=bootcamp-production-mission-control-username:latest,MISSION_CONTROL_PASSWORD=bootcamp-production-mission-control-password:latest,STRIPE_ENDPOINT_SECRET=bootcamp-production-stripe-endpoint-secret:latest,BASIC_AUTH_PASSWORD=bootcamp-production-basic-auth-password:latest,RECAPTCHA_SITE_KEY=bootcamp-production-recaptcha-site-key:latest,RECAPTCHA_SECRET_KEY=bootcamp-production-recaptcha-secret-key:latest,ROLLBAR_CLIENT_TOKEN=bootcamp-production-rollbar-client-token:latest,OPEN_AI_ACCESS_TOKEN=bootcamp-production-open-ai-access-token:latest,ANTHROPIC_API_KEY=bootcamp-production-anthropic-api-key:latest,PJORD_GITHUB_TOKEN=bootcamp-production-pjord-github-token:latest,STRIPE_TAX_RATE_ID=bootcamp-production-stripe-tax-rate-id:latest,DISCORD_CLIENT_ID=bootcamp-production-discord-client-id:latest,DISCORD_CLIENT_SECRET=bootcamp-production-discord-client-secret:latest,DISCORD_AUTHENTICATION_URL=bootcamp-production-discord-authentication-url:latest,PUBSUB_AUDIENCE=bootcamp-production-pubsub-audience:latest,PUBSUB_SERVICE_ACCOUNT_EMAIL=bootcamp-production-pubsub-service-account-email:latest,PUBSUB_TOPIC=bootcamp-production-pubsub-topic:latest,GITHUB_KEY=bootcamp-production-github-key:latest,GITHUB_SECRET=bootcamp-production-github-secret:latest,ROLLBAR_ACCESS_TOKEN=bootcamp-production-rollbar-access-token:latest,SLACK_WEBHOOK_URL=bootcamp-production-slack-webhook-url:latest,STRIPE_PUBLIC_KEY=bootcamp-production-stripe-public-key:latest,STRIPE_SECRET_KEY=bootcamp-production-stripe-secret-key:latest,POSTMARK_API_TOKEN=bootcamp-production-postmark-api-token:latest
      - >-
        --labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID,$_LABELS
  - id: UpdateLinkCheckerJob
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    waitFor:
      - Deploy
    args:
      - '-c'
      - |
        if gcloud run jobs describe link-checker --region=asia-northeast1 --quiet 2>/dev/null; then
          gcloud run jobs update link-checker \
            --region=asia-northeast1 \
            --image=asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA \
            --args="bin/rails,link_checker:run" \
            --set-cloudsql-instances=$_CLOUD_SQL_HOST \
            --memory=2G \
            --cpu=1 \
            --task-timeout=30m \
            --max-retries=1 \
            --set-env-vars="RAILS_ENV=production,RAILS_MASTER_KEY=$_RAILS_MASTER_KEY,APP_HOST_NAME=$_APP_HOST_NAME,DB_HOST=/cloudsql/$_CLOUD_SQL_HOST,DB_NAME=$_DB_NAME,DB_PASS=$_DB_PASS,DB_USER=$_DB_USER,DISCORD_BUG_WEBHOOK_URL=$_DISCORD_BUG_WEBHOOK_URL,RAILS_LOG_TO_STDOUT=true"
        else
          gcloud run jobs create link-checker \
            --region=asia-northeast1 \
            --image=asia.gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA \
            --args="bin/rails,link_checker:run" \
            --set-cloudsql-instances=$_CLOUD_SQL_HOST \
            --memory=2G \
            --cpu=1 \
            --task-timeout=30m \
            --max-retries=1 \
            --set-env-vars="RAILS_ENV=production,RAILS_MASTER_KEY=$_RAILS_MASTER_KEY,APP_HOST_NAME=$_APP_HOST_NAME,DB_HOST=/cloudsql/$_CLOUD_SQL_HOST,DB_NAME=$_DB_NAME,DB_PASS=$_DB_PASS,DB_USER=$_DB_USER,DISCORD_BUG_WEBHOOK_URL=$_DISCORD_BUG_WEBHOOK_URL,RAILS_LOG_TO_STDOUT=true"
        fi
  - id: Notify
    name: 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:latest'
    args:
      - bin/notify
    waitFor:
      - Deploy
    env:
      - DB_NAME=$_DB_NAME
      - DEPLOY_NOTIFY_WEBHOOK_URL=$_DEPLOY_NOTIFY_WEBHOOK_URL
timeout: 7200s
images:
  - 'asia.gcr.io/$PROJECT_ID/$REPO_NAME:latest'
substitutions:
  _APP_HOST_NAME: bootcamp.fjord.jp
