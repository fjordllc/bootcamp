openapi: 3.1.0
info:
  title: FJORD BOOT CAMP API
  version: 0.1.0
  summary: Machine-readable index of Bootcamp API access points.
  description: |
    This file documents the existing `/api` endpoints so humans, AI agents,
    and API tooling can understand the available access points from one place.
    It starts with route-level coverage and shared response shapes; detailed
    resource schemas should be expanded from `app/views/api/**/*.jbuilder` and
    `test/integration/api/**/*_test.rb`.

    Rails also accepts `PUT` for update routes generated from `resource` and
    `resources`; this document uses the canonical `PATCH` operation for those
    update endpoints.
servers:
  - url: https://bootcamp.fjord.jp
    description: Production
  - url: http://localhost:3000
    description: Local development
tags:
  - name: Admin
  - name: Mentor
  - name: Session
  - name: Notifications
  - name: Learning
  - name: Reports
  - name: Products
  - name: Questions
  - name: Users
  - name: Social
  - name: Content
  - name: Search
  - name: Utility
security:
  - sessionCookie: []
  - oauth2: []
paths:
  /api/session:
    post:
      tags: [Session]
      summary: Create an API session.
      requestBody:
        $ref: '#/components/requestBodies/GenericObject'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/pubsub:
    post:
      tags: [Utility]
      summary: Receive a Pub/Sub callback.
      requestBody:
        $ref: '#/components/requestBodies/GenericObject'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/image:
    post:
      tags: [Utility]
      summary: Upload an image.
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: true
      responses:
        '201':
          $ref: '#/components/responses/JsonObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/admin/count:
    get:
      tags: [Admin]
      summary: Return admin dashboard counts.
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/admin/inquiries/{id}:
    patch:
      tags: [Admin]
      summary: Update an inquiry from the admin API.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        $ref: '#/components/requestBodies/GenericObject'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/mentor/practices:
    get:
      tags: [Mentor]
      summary: List practices for mentors.
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/courses/{course_id}/practices:
    get:
      tags: [Learning]
      summary: List practices in a course.
      parameters:
        - $ref: '#/components/parameters/CourseId'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/courses_categories/{courses_category_id}/position:
    patch:
      tags: [Learning]
      summary: Update a course category position.
      parameters:
        - $ref: '#/components/parameters/CoursesCategoryId'
      requestBody:
        $ref: '#/components/requestBodies/Position'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/categories_practices/{categories_practice_id}/position:
    patch:
      tags: [Learning]
      summary: Update a category practice position.
      parameters:
        - $ref: '#/components/parameters/CategoriesPracticeId'
      requestBody:
        $ref: '#/components/requestBodies/Position'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/notifications:
    get:
      tags: [Notifications]
      summary: List notifications.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [unread]
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/notifications/{notification_id}/read_mark:
    patch:
      tags: [Notifications]
      summary: Mark one notification as read.
      parameters:
        - name: notification_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/notifications/all_read_mark:
    patch:
      tags: [Notifications]
      summary: Mark all notifications as read.
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/notifications/category_read_mark:
    patch:
      tags: [Notifications]
      summary: Mark notifications in a category as read.
      parameters:
        - name: target
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/subscriptions:
    get:
      tags: [Users]
      summary: List subscriptions for the current user.
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/comments:
    get:
      tags: [Social]
      summary: List comments.
      parameters:
        - name: commentable_type
          in: query
          schema:
            type: string
        - name: commentable_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
    post:
      tags: [Social]
      summary: Create a comment.
      requestBody:
        $ref: '#/components/requestBodies/GenericObject'
      responses:
        '201':
          $ref: '#/components/responses/JsonObject'
  /api/comments/{id}:
    patch:
      tags: [Social]
      summary: Update a comment.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        $ref: '#/components/requestBodies/GenericObject'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
    delete:
      tags: [Social]
      summary: Delete a comment.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/answers:
    get:
      tags: [Questions]
      summary: List answers.
      parameters:
        - name: user_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
    post:
      tags: [Questions]
      summary: Create an answer.
      requestBody:
        $ref: '#/components/requestBodies/GenericObject'
      responses:
        '201':
          $ref: '#/components/responses/JsonObject'
  /api/answers/{id}:
    patch:
      tags: [Questions]
      summary: Update an answer.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        $ref: '#/components/requestBodies/GenericObject'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
    delete:
      tags: [Questions]
      summary: Delete an answer.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/answers/{answer_id}/correct_answer:
    post:
      tags: [Questions]
      summary: Mark an answer as the correct answer.
      parameters:
        - $ref: '#/components/parameters/AnswerId'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
    patch:
      tags: [Questions]
      summary: Update the correct answer marker for an answer.
      parameters:
        - $ref: '#/components/parameters/AnswerId'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/available_emojis:
    get:
      tags: [Social]
      summary: List available reaction emojis.
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/reactions:
    get:
      tags: [Social]
      summary: List reactions.
      parameters:
        - name: reactionable_gid
          in: query
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
    post:
      tags: [Social]
      summary: Create a reaction.
      parameters:
        - name: reactionable_gid
          in: query
          schema:
            type: string
        - name: kind
          in: query
          schema:
            type: string
      responses:
        '201':
          $ref: '#/components/responses/JsonObject'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/reactions/{id}:
    delete:
      tags: [Social]
      summary: Delete a reaction.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/checks:
    get:
      tags: [Social]
      summary: List checks.
      parameters:
        - name: checkable_type
          in: query
          schema:
            type: string
        - name: checkable_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
    post:
      tags: [Social]
      summary: Create a check.
      requestBody:
        $ref: '#/components/requestBodies/GenericObject'
      responses:
        '201':
          $ref: '#/components/responses/JsonObject'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/checks/{id}:
    delete:
      tags: [Social]
      summary: Delete a check.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/mention_users:
    get:
      tags: [Users]
      summary: List users available for mention autocomplete.
      parameters:
        - name: query
          in: query
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/users:
    get:
      tags: [Users]
      summary: List users.
      parameters:
        - name: target
          in: query
          schema:
            type: string
        - name: watch
          in: query
          schema:
            type: boolean
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/users/{id}:
    get:
      tags: [Users]
      summary: Show a user. Use `show` as id for the authorized user with OAuth.
      parameters:
        - $ref: '#/components/parameters/IdOrShow'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Users]
      summary: Update a user.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        $ref: '#/components/requestBodies/GenericObject'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/users/{user_id}/support_context:
    get:
      tags: [Users]
      summary: Show mentor support context for a user.
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/users/tags/{tag}:
    get:
      tags: [Users]
      summary: List users by tag.
      parameters:
        - name: tag
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/practices:
    get:
      tags: [Learning]
      summary: List practices.
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/practices/{id}:
    get:
      tags: [Learning]
      summary: Show a practice.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
    patch:
      tags: [Learning]
      summary: Update a practice.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        $ref: '#/components/requestBodies/GenericObject'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/practices/{practice_id}/learning:
    get:
      tags: [Learning]
      summary: Show learning status for a practice.
      parameters:
        - $ref: '#/components/parameters/PracticeId'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
    patch:
      tags: [Learning]
      summary: Update learning status for a practice.
      parameters:
        - $ref: '#/components/parameters/PracticeId'
      requestBody:
        $ref: '#/components/requestBodies/GenericObject'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/practices/{practice_id}/learning/completion_message:
    patch:
      tags: [Learning]
      summary: Update the learning completion message for a practice.
      parameters:
        - $ref: '#/components/parameters/PracticeId'
      requestBody:
        $ref: '#/components/requestBodies/GenericObject'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/coding_tests/{coding_test_id}/position:
    patch:
      tags: [Learning]
      summary: Update a coding test position.
      parameters:
        - name: coding_test_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        $ref: '#/components/requestBodies/Position'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/coding_test_submissions:
    post:
      tags: [Learning]
      summary: Create a coding test submission.
      requestBody:
        $ref: '#/components/requestBodies/GenericObject'
      responses:
        '201':
          $ref: '#/components/responses/JsonObject'
  /api/reports/unchecked:
    get:
      tags: [Reports]
      summary: List unchecked reports.
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/reports/unchecked/counts:
    get:
      tags: [Reports]
      summary: Return unchecked report counts as text.
      responses:
        '200':
          $ref: '#/components/responses/Text'
  /api/reports/recents:
    get:
      tags: [Reports]
      summary: List recent reports.
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/reports:
    get:
      tags: [Reports]
      summary: List reports.
      parameters:
        - name: user_id
          in: query
          schema:
            type: integer
        - name: company_id
          in: query
          schema:
            type: integer
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
    post:
      tags: [Reports]
      summary: Create a report.
      requestBody:
        $ref: '#/components/requestBodies/Report'
      responses:
        '201':
          $ref: '#/components/responses/JsonObject'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/reports/{id}:
    get:
      tags: [Reports]
      summary: Show a report.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
    patch:
      tags: [Reports]
      summary: Update a report.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        $ref: '#/components/requestBodies/Report'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Reports]
      summary: Delete a report.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/reports/{report_id}/comments:
    post:
      tags: [Reports]
      summary: Create a comment on a report.
      parameters:
        - $ref: '#/components/parameters/ReportId'
      requestBody:
        $ref: '#/components/requestBodies/GenericObject'
      responses:
        '201':
          $ref: '#/components/responses/JsonObject'
  /api/reports/{report_id}/reactions:
    get:
      tags: [Reports]
      summary: List reactions on a report.
      parameters:
        - $ref: '#/components/parameters/ReportId'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
    post:
      tags: [Reports]
      summary: Create a reaction on a report.
      parameters:
        - $ref: '#/components/parameters/ReportId'
      requestBody:
        $ref: '#/components/requestBodies/Reaction'
      responses:
        '201':
          $ref: '#/components/responses/JsonObject'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/reports/{report_id}/reactions/{id}:
    delete:
      tags: [Reports]
      summary: Delete a reaction on a report.
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/reports/{report_id}/check:
    post:
      tags: [Reports]
      summary: Check a report.
      parameters:
        - $ref: '#/components/parameters/ReportId'
      responses:
        '201':
          $ref: '#/components/responses/JsonObject'
    delete:
      tags: [Reports]
      summary: Uncheck a report.
      parameters:
        - $ref: '#/components/parameters/ReportId'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/watches:
    get:
      tags: [Social]
      summary: List watches.
      parameters:
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
    post:
      tags: [Social]
      summary: Create a watch.
      requestBody:
        $ref: '#/components/requestBodies/Watch'
      responses:
        '201':
          $ref: '#/components/responses/JsonObject'
  /api/watches/{id}:
    delete:
      tags: [Social]
      summary: Delete a watch.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/watches/toggle:
    get:
      tags: [Social]
      summary: Toggle watch state for a watchable resource.
      parameters:
        - name: watchable_id
          in: query
          schema:
            type: integer
        - name: watchable_type
          in: query
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/mentor_memos/{id}:
    patch:
      tags: [Mentor]
      summary: Update a mentor memo.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        $ref: '#/components/requestBodies/GenericObject'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/tags:
    get:
      tags: [Content]
      summary: List tags.
      parameters:
        - name: taggable_type
          in: query
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/tags/{id}:
    patch:
      tags: [Content]
      summary: Update a tag.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        $ref: '#/components/requestBodies/GenericObject'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/pages/{id}:
    patch:
      tags: [Content]
      summary: Update a page.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        $ref: '#/components/requestBodies/GenericObject'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/questions:
    get:
      tags: [Questions]
      summary: List questions.
      parameters:
        - name: user_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/questions/{id}:
    get:
      tags: [Questions]
      summary: Show a question.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
    patch:
      tags: [Questions]
      summary: Update a question.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        $ref: '#/components/requestBodies/GenericObject'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/followings:
    post:
      tags: [Social]
      summary: Follow a user.
      parameters:
        - name: watch
          in: query
          schema:
            type: boolean
      requestBody:
        $ref: '#/components/requestBodies/GenericObject'
      responses:
        '201':
          $ref: '#/components/responses/JsonObject'
  /api/followings/{id}:
    patch:
      tags: [Social]
      summary: Update a following.
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: watch
          in: query
          schema:
            type: boolean
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
    delete:
      tags: [Social]
      summary: Unfollow a user.
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: watch
          in: query
          schema:
            type: boolean
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/products/unchecked:
    get:
      tags: [Products]
      summary: List unchecked products.
      parameters:
        - name: checker_id
          in: query
          schema:
            type: integer
        - name: target
          in: query
          schema:
            type: string
            enum: [unchecked_no_replied]
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/products/unassigned:
    get:
      tags: [Products]
      summary: List unassigned products.
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/products/unassigned/counts:
    get:
      tags: [Products]
      summary: Return unassigned product counts as text.
      responses:
        '200':
          $ref: '#/components/responses/Text'
  /api/products/self_assigned:
    get:
      tags: [Products]
      summary: List products assigned to the current mentor.
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/products/checker:
    get:
      tags: [Products]
      summary: Show checker state for a product.
      parameters:
        - name: product_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
    patch:
      tags: [Products]
      summary: Assign or update a product checker.
      requestBody:
        $ref: '#/components/requestBodies/GenericObject'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
    delete:
      tags: [Products]
      summary: Remove a product checker.
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
  /api/products/passed:
    get:
      tags: [Products]
      summary: Return passed product status as text.
      responses:
        '200':
          $ref: '#/components/responses/Text'
  /api/products:
    get:
      tags: [Products]
      summary: List products.
      parameters:
        - name: company_id
          in: query
          schema:
            type: integer
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
    post:
      tags: [Products]
      summary: Create a product.
      requestBody:
        $ref: '#/components/requestBodies/Product'
      responses:
        '201':
