      summary: Delete buzz state.
      responses:
        '200':
          $ref: '#/components/responses/JsonObject'
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: _bootcamp_session
      description: Browser session or JWT-backed API session used by existing UI/API calls.
    oauth2:
      type: oauth2
      description: Doorkeeper OAuth2 bearer token. Some write endpoints require the `write` scope.
      flows:
        authorizationCode:
          authorizationUrl: /oauth/authorize
          tokenUrl: /oauth/token
          scopes:
            read: Read API resources.
            write: Create, update, or delete API resources.
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
    IdOrShow:
      name: id
      in: path
      required: true
      schema:
        oneOf:
          - type: integer
          - type: string
            enum: [show]
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: integer
    CourseId:
      name: course_id
      in: path
      required: true
      schema:
        type: integer
    PracticeId:
      name: practice_id
      in: path
      required: true
      schema:
        type: integer
    ReportId:
      name: report_id
      in: path
      required: true
      schema:
        type: integer
    ProductId:
      name: product_id
      in: path
      required: true
      schema:
        type: integer
    AnswerId:
      name: answer_id
      in: path
      required: true
      schema:
        type: integer
    CoursesCategoryId:
      name: courses_category_id
      in: path
      required: true
      schema:
        type: integer
    CategoriesPracticeId:
      name: categories_practice_id
      in: path
      required: true
      schema:
        type: integer
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
  requestBodies:
    GenericObject:
      required: false
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    Position:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              position:
                type: integer
            additionalProperties: true
    Reaction:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              kind:
                type: string
            additionalProperties: true
    Watch:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              watchable_id:
                type: integer
              watchable_type:
                type: string
            additionalProperties: true
    Product:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              product:
                type: object
                properties:
                  practice_id:
                    type: integer
                  body:
                    type: string
                  wip:
                    type: boolean
                additionalProperties: true
            additionalProperties: true
    Report:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              report:
                type: object
                properties:
                  title:
                    type: string
                  reported_on:
                    type: string
                    format: date
                  emotion:
                    type: string
                    enum: [sad, neutral, happy, positive]
                  description:
                    type: string
                  wip:
                    type: boolean
                  practice_ids:
                    type: array
                    maxItems: 100
                    items:
                      type: integer
                  learning_times_attributes:
                    type: object
                    additionalProperties: true
                additionalProperties: true
            additionalProperties: true
  responses:
    JsonObject:
      description: JSON response. Expand the schema from the matching jbuilder view and integration test.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiObject'
    Text:
      description: Plain text response.
      content:
        text/plain:
          schema:
            type: string
    Unauthorized:
      description: Authentication is required or the bearer token is invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: The authenticated user is not allowed to perform this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource was not found or is hidden from the authenticated user.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: Request parameters are invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationError:
      description: Validation failed.
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: object
                additionalProperties: true
  schemas:
    ApiObject:
      type: object
      additionalProperties: true
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        error_description:
          type: string
        state:
          type: string
      additionalProperties: true
