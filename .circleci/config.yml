version: 2.1

orbs:
  ruby: circleci/ruby@2.5.4
  node: circleci/node@7.1.1
  browser-tools: circleci/browser-tools@2.3.1
jobs:
  build:
    docker:
      - image: cimg/ruby:3.4.3-node
    steps:
      - checkout
      - run:
          name: Configure Bundler
          command: |
            bundle config set --local force_ruby_platform true
            bundle lock --add-platform ruby
      - ruby/install-deps
      - node/install:
          install-yarn: true
          node-version: '22.19.0'
      - node/install-packages:
          pkg-manager: yarn
  check:
    docker:
      - image: 'cimg/ruby:3.4.3-node'
    steps:
      - checkout
      - run:
          name: Configure Bundler
          command: |
            bundle config set --local force_ruby_platform true
            bundle lock --add-platform ruby
      - ruby/install-deps
      - ruby/rubocop-check:
          format: progress
          label: Inspecting with Rubocop
      - run:
          name: Slim Lint
          command: bundle exec slim-lint app/views -c config/slim_lint.yml
      - run:
          name: Update package list
          command: sudo apt-get update
      - run:
          name: Install libvips
          command: sudo apt-get install -y libvips
      - run:
          name: Traceroute
          command: FAIL_ON_ERROR=1 bundle exec rake traceroute
      - node/install:
          install-yarn: true
          node-version: '22.19.0'
      - node/install-packages:
          pkg-manager: yarn
      - run:
          name: Lint
          command: bin/yarn lint
  test:
    docker:
      - image: cimg/ruby:3.4.3-browsers
        environment:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_test
      - image: cimg/postgres:14.4
    resource_class: large
    environment:
      BUNDLE_JOBS: '3'
      BUNDLE_RETRY: '3'
      PGHOST: 127.0.0.1
      PGUSER: postgres
      PGPASSWORD: 'postgres'
      RAILS_ENV: test
      DATABASE_URL: 'postgres://postgres:postgres@localhost/ci_test'
      TZ: Asia/Tokyo
    parallelism: 8
    steps:
      - checkout
      - browser-tools/install_browser_tools
      - run:
          command: |
            google-chrome --version
            chromedriver --version
          name: Check install
      - run:
          name: Configure Bundler
          command: |
            bundle config set --local force_ruby_platform true
            bundle lock --add-platform ruby
      - ruby/install-deps:
          clean-bundle: true
      - node/install:
          install-yarn: true
          node-version: '22.19.0'
      - node/install-packages:
          pkg-manager: yarn
      - run:
          name: Install japanese font
          command: sudo apt-get install -y fonts-noto-cjk
      - run:
          name: Install libvips
          command: sudo apt-get install -y libvips
      - run:
          name: Wait for DB
          command: 'dockerize -wait tcp://localhost:5432 -timeout 1m'
      - run:
          name: Database setup
          command: 'bundle exec rails db:setup'
      - run:
          name: Assets precompile
          command: 'bundle exec rails assets:clean assets:precompile NODE_OPTIONS=--openssl-legacy-provider'
      - run:
          name: Clear memory before tests
          command: |
            # Clear system caches to free memory after assets precompile
            sync
            echo 3 | sudo tee /proc/sys/vm/drop_caches > /dev/null || true
            # Run aggressive garbage collection
            ruby -e "GC.start(full_mark: true, immediate_sweep: true)" || true
            # Kill any orphaned chrome processes from previous runs
            pkill -9 chrome || true
            pkill -9 chromedriver || true
            # Wait for processes to clean up
            sleep 2
            # Show memory status
            free -m
      - run:
          name: Test
          command: |
            # Start memory monitor in background (include timestamps)
            (while true; do
              MEM_USED=$(free -m | awk 'NR==2{print $3}')
              MEM_TOTAL=$(free -m | awk 'NR==2{print $2}')
              MEM_PCT=$((MEM_USED * 100 / MEM_TOTAL))
              echo "[MEMORY] $(date '+%H:%M:%S') Used: ${MEM_USED}MB / ${MEM_TOTAL}MB (${MEM_PCT}%)"
              sleep 60
            done) &
            MONITOR_PID=$!

            echo "[INFO] Starting tests at $(date '+%Y-%m-%d %H:%M:%S')"
            echo "[INFO] Node index: $CIRCLE_NODE_INDEX / Total nodes: $CIRCLE_NODE_TOTAL"

            # Run tests with circleci tests split for parallel execution
            # Use name-based splitting (round-robin) for even distribution
            TEST_FILES=$(circleci tests glob "test/**/*_test.rb" | circleci tests split --split-by=name)
            TOTAL_FILES=$(echo "$TEST_FILES" | wc -l)
            echo "[INFO] Running $TOTAL_FILES test files on this node"

            # Run all tests
            bundle exec rails test $TEST_FILES
            TEST_EXIT_CODE=$?

            echo "[INFO] Tests completed at $(date '+%Y-%m-%d %H:%M:%S')"

            # Kill memory monitor
            kill $MONITOR_PID 2>/dev/null || true

            exit $TEST_EXIT_CODE
          no_output_timeout: 10m
      - store_test_results:
          path: test/reports
      - store_artifacts:
          path: tmp/screenshots
workflows:
  build_and_test:
    jobs:
      - build
      - check
      - test:
          requires:
            - build
